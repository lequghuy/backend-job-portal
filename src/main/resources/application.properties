spring.application.name=job-portal

# Port: local = 8080, Render = PORT server c?p
server.port=${PORT:8080}

# LOCAL DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/job_portal?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## JPA & Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.default-property-inclusion=non_null

# Turn off the "open-in-view" warning if you don't need lazy-loading in the web layer
spring.jpa.open-in-view=false

## JWT Properties
# jwt.secret=1234567890123456789012345678901234567890123456789012345678901234
# jwt.expiration=86400000